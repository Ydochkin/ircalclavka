<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Калькулятор — Яндекс Лавка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#29B6F6;--blue-dark:#0d9fdf;--blue-bg:#e3f6fe;
  --bg:#f5f5f7;--card:#fff;--text:#1c1c1e;--sub:#6e6e73;--border:#e0e0e5;
  --s1:#e74c3c;--s2:#e67e22;--s3:#d4a800;--s4:#27ae60;--s5:#1a8a4a;
  --r:12px;--r-sm:8px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
}

/* ── HEADER ── */
.header{
  background:#fff;
  border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.header-inner{
  max-width:860px;margin:0 auto;
  padding:18px 24px 16px;
  display:flex;align-items:center;gap:14px;
}
.logo{flex-shrink:0}
.header-text h1{color:var(--text);font-size:1.2rem;font-weight:700;line-height:1.2}
.header-text p{color:var(--sub);font-size:.78rem;margin-top:2px}

/* ── PAGE WRAP ── */
.page{max-width:860px;margin:0 auto;padding:20px 16px 40px}

/* ── REGION TOGGLE ── */
.region-toggle{
  display:flex;background:var(--card);border-radius:var(--r);
  padding:4px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:18px;
}
.region-btn{
  flex:1;padding:10px 8px;border:none;background:transparent;
  border-radius:9px;font-size:.9rem;font-weight:500;color:var(--sub);
  cursor:pointer;transition:all .18s;
}
.region-btn.active{
  background:var(--blue);color:#fff;font-weight:700;
  box-shadow:0 2px 10px rgba(41,182,246,.32);
}

/* ── GRID ── */
.metrics-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-bottom:16px;
}
@media(max-width:540px){.metrics-grid{grid-template-columns:1fr}}

/* ── METRIC CARD ── */
.mc{
  background:var(--card);border-radius:var(--r);
  padding:16px 16px 12px;
  box-shadow:0 1px 5px rgba(0,0,0,.06);
  border-top:3px solid var(--border);
  transition:border-color .2s;
}
.mc.has-value{border-top-color:var(--blue)}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.mc-name{font-size:.95rem;font-weight:700;color:var(--text)}
.mc-hint{font-size:.72rem;color:var(--sub);margin-top:2px}
.mc-badge{
  background:var(--blue-bg);color:var(--blue-dark);
  font-size:.75rem;font-weight:700;
  padding:3px 9px;border-radius:20px;flex-shrink:0;
}
.mc-input{
  width:100%;height:46px;
  border:2px solid var(--border);border-radius:var(--r-sm);
  font-size:1.15rem;font-weight:600;padding:0 12px;
  color:var(--text);background:var(--bg);
  transition:border-color .18s,background .18s;
  -webkit-appearance:none;appearance:none;
}
.mc-input:focus{outline:none;border-color:var(--blue);background:#fff}
.mc-input.error{border-color:var(--s1)!important}

/* pills */
.pills{display:flex;gap:4px;margin-top:10px}
.pill{flex:1;height:5px;border-radius:3px;background:var(--border);transition:background .25s}
.pill.p1{background:var(--s1)}.pill.p2{background:var(--s2)}
.pill.p3{background:var(--s3)}.pill.p4{background:var(--s4)}.pill.p5{background:var(--s5)}
.score-lbl{font-size:.72rem;font-weight:700;margin-top:5px;height:14px;transition:color .2s}

/* ── CALCULATE ── */
.calc-btn{
  width:100%;height:52px;
  background:var(--blue);color:#fff;border:none;border-radius:var(--r);
  font-size:1.05rem;font-weight:700;cursor:pointer;letter-spacing:.2px;
  box-shadow:0 4px 16px rgba(33,165,222,.35);
  transition:transform .12s,box-shadow .12s;
  margin-bottom:16px;
}
.calc-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(33,165,222,.4)}
.calc-btn:active{transform:scale(.98);box-shadow:0 2px 8px rgba(33,165,222,.3)}

/* ── RESULT ── */
.result-wrap{display:none;margin-bottom:12px}
.result-top{
  border-radius:var(--r);padding:24px 20px 20px;
  text-align:center;margin-bottom:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.result-ir{font-size:3.4rem;font-weight:800;line-height:1;letter-spacing:-1.5px}
.result-lbl{font-size:.85rem;font-weight:500;margin-top:4px;opacity:.72}
.result-bonus{
  display:inline-block;margin-top:14px;
  font-size:1.1rem;font-weight:700;
  padding:7px 22px;border-radius:22px;
  background:rgba(255,255,255,.38);
}
.r-red   {background:#ffebee;color:#c62828}
.r-orange{background:#fff3e0;color:#e65100}
.r-yellow{background:#fffde7;color:#b8860b}
.r-teal  {background:#e0f2f1;color:#00695c}
.r-green {background:#e8f5e9;color:#2e7d32}

/* breakdown grid: 1 col on mobile, 2 on desktop */
.breakdown{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
@media(max-width:540px){.breakdown{grid-template-columns:1fr}}

.bd-row{
  background:var(--card);border-radius:var(--r-sm);
  padding:12px 14px;display:flex;
  justify-content:space-between;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.bd-name{font-size:.88rem;font-weight:700}
.bd-meta{font-size:.72rem;color:var(--sub);margin-top:2px}
.bd-right{display:flex;align-items:center;gap:8px}
.dot{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:800;color:#fff;flex-shrink:0;
}
.dot.d1{background:var(--s1)}.dot.d2{background:var(--s2)}
.dot.d3{background:var(--s3);color:#333}.dot.d4{background:var(--s4)}.dot.d5{background:var(--s5)}
.bd-contrib{font-size:.88rem;font-weight:700;color:var(--sub);min-width:34px;text-align:right}

/* ── RESET ── */
.reset-btn{
  display:none;width:100%;height:42px;
  background:transparent;border:2px solid var(--border);
  border-radius:var(--r);font-size:.9rem;font-weight:600;
  color:var(--sub);cursor:pointer;margin-bottom:16px;
  transition:border-color .15s,color .15s;
}
.reset-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── HISTORY ── */
.history-wrap{display:none}
.section-title{
  font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.9px;color:var(--sub);margin-bottom:8px;
}
.history-item{
  background:var(--card);border-radius:var(--r-sm);
  padding:10px 14px;display:flex;
  justify-content:space-between;align-items:center;
  margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.h-date{font-size:.75rem;color:var(--sub)}
.h-score{font-size:.95rem;font-weight:700}
.h-bonus{font-size:.78rem;font-weight:700;color:var(--blue-dark)}

/* ── FOOTER ── */
.footer{
  text-align:center;font-size:.72rem;color:var(--sub);
  margin-top:8px;padding-bottom:env(safe-area-inset-bottom);
}
</style>
</head>

      </div>
      <input class="mc-input" type="number" id="defect" step="0.01" min="0" max="100" placeholder="%" inputmode="decimal" oninput="onInput('defect')">
      <div class="pills" id="pills-defect"><div class="pill" id="pill-defect-1"></div><div class="pill" id="pill-defect-2"></div><div class="pill" id="pill-defect-3"></div><div class="pill" id="pill-defect-4"></div><div class="pill" id="pill-defect-5"></div></div>
      <div class="score-lbl" id="label-defect"></div>
    </div>

    <div class="mc" id="mc-writeoffs">
      <div class="mc-top">
        <div><div class="mc-name">Writeoffs</div><div class="mc-hint">Цель: ≤1.1%</div></div>
        <div class="mc-badge">5%</div>
      </div>
      <input class="mc-input" type="number" id="writeoffs" step="0.1" min="0" max="100" placeholder="%" inputmode="decimal" oninput="onInput('writeoffs')">
      <div class="pills" id="pills-writeoffs"><div class="pill" id="pill-writeoffs-1"></div><div class="pill" id="pill-writeoffs-2"></div><div class="pill" id="pill-writeoffs-3"></div><div class="pill" id="pill-writeoffs-4"></div><div class="pill" id="pill-writeoffs-5"></div></div>
      <div class="score-lbl" id="label-writeoffs"></div>
    </div>

    <div class="mc" id="mc-ipmh" style="grid-column:1/-1">
      <div class="mc-top">
        <div><div class="mc-name">IPMH</div><div class="mc-hint" id="hint-ipmh">Цель: ≥9.5 (Москва/СПб)</div></div>
        <div class="mc-badge">30%</div>
      </div>
      <input class="mc-input" type="number" id="ipmh" step="0.1" min="0" placeholder="блюд/ч" inputmode="decimal" oninput="onInput('ipmh')">
      <div class="pills" id="pills-ipmh"><div class="pill" id="pill-ipmh-1"></div><div class="pill" id="pill-ipmh-2"></div><div class="pill" id="pill-ipmh-3"></div><div class="pill" id="pill-ipmh-4"></div><div class="pill" id="pill-ipmh-5"></div></div>
      <div class="score-lbl" id="label-ipmh"></div>
    </div>

  </div>

  <button class="calc-btn" onclick="calculateIR()">Рассчитать IR</button>

  <div class="result-wrap" id="result-wrap">
    <div class="result-top" id="result-card">
      <div class="result-ir" id="result-ir">—</div>
      <div class="result-lbl" id="result-lbl"></div>
      <div class="result-bonus" id="result-bonus"></div>
    </div>
    <div class="breakdown" id="breakdown"></div>
  </div>

  <button class="reset-btn" id="reset-btn" onclick="resetForm()">Сбросить</button>

  <div class="history-wrap" id="history-wrap">
    <div class="section-title">История расчётов</div>
    <div id="history-list"></div>
  </div>

  <div class="footer">Яндекс Лавка · Мотивация ТМ</div>
</div>

<script>
const METRICS = ['sla','kfull','defect','writeoffs','ipmh'];
const WEIGHTS = {sla:.30,kfull:.15,defect:.20,writeoffs:.05,ipmh:.30};
const NAMES   = {sla:'SLA ТМ',kfull:'Kfull',defect:'Defect rate',writeoffs:'Writeoffs',ipmh:'IPMH'};
const UNITS   = {sla:'%',kfull:'',defect:'%',writeoffs:'%',ipmh:''};
const SLBLS   = ['','Слабо','Ниже цели','Средне','Хорошо','Отлично'];
const SCLRS   = ['','#e74c3c','#e67e22','#c9a00b','#27ae60','#1a7a3f'];

let region = 'moscow';
let hist = JSON.parse(localStorage.getItem('irHist')||'[]');

function setRegion(r){
  region = r;
  document.getElementById('btn-moscow').classList.toggle('active', r==='moscow');
  document.getElementById('btn-regional').classList.toggle('active', r==='regional');
  document.getElementById('hint-ipmh').textContent = r==='moscow'
    ? 'Цель: ≥9.5 (Москва/СПб)' : 'Цель: ≥8.8 (Регионы)';
  METRICS.forEach(m => onInput(m));
}

function getScore(v, m){
  if(isNaN(v)) return 0;
  if(m==='sla'){
    if(v<87) return 1; if(v<90) return 2; if(v<92) return 3; if(v<95.5) return 4; return 5;
  }
  if(m==='kfull'){
    if(v>10) return 1; if(v>9) return 2; if(v>7.5) return 3; if(v>6.5) return 4; return 5;
  }
  if(m==='defect'){
    if(v>.25) return 1; if(v>.20) return 2; if(v>.16) return 3; if(v>.12) return 4; return 5;
  }
  if(m==='writeoffs'){
    if(v>2) return 1; if(v>1.5) return 2; if(v>1.3) return 3; if(v>1.1) return 4; return 5;
  }
  if(m==='ipmh'){
    if(region==='moscow'){
      if(v<8.5) return 1; if(v<8.7) return 2; if(v<9.1) return 3; if(v<9.5) return 4; return 5;
    } else {
      if(v<7.5) return 1; if(v<8) return 2; if(v<8.3) return 3; if(v<8.8) return 4; return 5;
    }
  }
  return 0;
}

function onInput(m){
  const v = parseFloat(document.getElementById(m).value);
  const s = isNaN(v) ? 0 : getScore(v,m);
  for(let i=1;i<=5;i++){
    const p = document.getElementById(`pill-${m}-${i}`);
    p.className = 'pill' + (s>=i ? ` p${s}` : '');
  }
  const lbl = document.getElementById(`label-${m}`);
  lbl.textContent = s ? `${s} — ${SLBLS[s]}` : '';
  lbl.style.color = s ? SCLRS[s] : '';
  document.getElementById(`mc-${m}`).classList.toggle('has-value', !isNaN(v) && v!=='');
}

function bonus(ir){ return ir>=4.5?'50%':ir>=4?'45%':ir>=3.5?'40%':ir>=3?'35%':'0%'; }
function rClass(ir){ return ir>=4.5?'r-green':ir>=4?'r-teal':ir>=3.5?'r-yellow':ir>=3?'r-orange':'r-red'; }
function rLabel(ir){ return ir>=4.5?'Отлично':ir>=4?'Очень хорошо':ir>=3.5?'Хорошо':ir>=3?'Удовлетворительно':'Требует внимания'; }

function calculateIR(){
  const vals={};
  METRICS.forEach(m => vals[m]=parseFloat(document.getElementById(m).value));
  if(Object.values(vals).some(v=>isNaN(v))){
    METRICS.forEach(m=>{
      if(isNaN(vals[m])){
        const el=document.getElementById(m);
        el.classList.add('error');
        setTimeout(()=>el.classList.remove('error'),1400);
      }
    });
    return;
  }
  const scores={};let ir=0;
  METRICS.forEach(m=>{ scores[m]=getScore(vals[m],m); ir+=scores[m]*WEIGHTS[m]; });

  const card=document.getElementById('result-card');
  card.className='result-top '+rClass(ir);
  document.getElementById('result-ir').textContent=ir.toFixed(2);
  document.getElementById('result-lbl').textContent=rLabel(ir);
  document.getElementById('result-bonus').textContent=`Бонус: ${bonus(ir)} от оклада`;

  document.getElementById('breakdown').innerHTML=METRICS.map(m=>{
    const s=scores[m],c=(s*WEIGHTS[m]).toFixed(2),u=UNITS[m];
    return `<div class="bd-row">
      <div><div class="bd-name">${NAMES[m]}</div><div class="bd-meta">${vals[m]}${u} · ${WEIGHTS[m]*100}%</div></div>
      <div class="bd-right"><div class="dot d${s}">${s}</div><div class="bd-contrib">+${c}</div></div>
    </div>`;
  }).join('');

  document.getElementById('result-wrap').style.display='block';
  document.getElementById('reset-btn').style.display='block';

  const entry={
    date:new Date().toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
    ir:ir.toFixed(2),lbl:rLabel(ir),bonus:bonus(ir),
    reg:region==='moscow'?'МСК/СПб':'Регионы'
  };
  hist.unshift(entry); if(hist.length>5) hist.pop();
  localStorage.setItem('irHist',JSON.stringify(hist));
  renderHistory();

  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

function resetForm(){
  METRICS.forEach(m=>{ document.getElementById(m).value=''; onInput(m); });
  document.getElementById('result-wrap').style.display='none';
  document.getElementById('reset-btn').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderHistory(){
  if(!hist.length) return;
  document.getElementById('history-wrap').style.display='block';
  document.getElementById('history-list').innerHTML=hist.map(h=>`
    <div class="history-item">
      <div class="h-date">${h.date} · ${h.reg}</div>
      <div class="h-score">IR ${h.ir}</div>
      <div class="h-bonus">${h.bonus} от оклада</div>
    </div>`).join('');
}

renderHistory();
</script>
</body>
</html>
